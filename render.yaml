services:
  - type: web
    name: pos-v3-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "POS System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: POS_ADMIN_NAME
        sync: false
      - key: POS_ADMIN_USERNAME
        value: owner
      - key: POS_ADMIN_EMAIL
        sync: false
      - key: POS_ADMIN_PASSWORD
        sync: false
      - key: POS_STORE_NAME
        sync: false
      - key: POS_STORE_ADDRESS
        sync: false
      - key: POS_STORE_PHONE
        sync: false
      - key: POS_RECEIPT_FOOTER
        value: "Thank you for your purchase."
      - key: POS_SEED_DEMO_DATA
        value: "false"
